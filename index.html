        html, body, #map {

        .map-title {
            position: absolute;

        }
        /* hide basemaps from legend (they remain visible) */

        .leaflet-control-layers-tree .leaflet-layerstree-header:has(> span:contains("Esri Shaded Relief")) {

            font-size: 0.9rem;
        }

        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

        // Boundary labels: visible at default zoom (zoom level ~6-7?), off after zoom 9? 
        // We'll use a scale threshold: roughly zoom level 8 = ~1:100k, but we use zoom level.
        // User said: visible at default (zoom ~7), off after 1:400,000 (zoom ~9). 
        // We'll turn off boundary labels when zoom > 8 (i.e., zoom level 9+)
        // Urban centers labels: off at default, on after zooming in (zoom >= 10)
        function updateLabels() {
            var zoom = map.getZoom();
            var boundaryLabel = document.querySelector('.css_Boundary_8');
            var urbanLabel = document.querySelector('.css_UrbanCentersWaterPoints_7');
            // Boundary: visible at zoom <= 8, hidden at zoom >= 9
            if (boundaryLabel) {
                if (zoom <= 8) {
                    boundaryLabel.style.display = 'block';
                } else {
                    boundaryLabel.style.display = 'none';
                }
            }
            // Urban Centers: hidden at zoom <= 9, visible at zoom >= 10
            if (urbanLabel) {
                if (zoom >= 10) {
                    urbanLabel.style.display = 'block';
                } else {
                    urbanLabel.style.display = 'none';
                }
            }
        }
